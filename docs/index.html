<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gym Knowledge Browser</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #21253a;
      --border: #2e334d;
      --accent: #4f8ef7;
      --text: #e2e5f0;
      --text-muted: #7b82a0;
      --badge-bp-bg: #1a3a6b;
      --badge-bp-fg: #7bb3f7;
      --badge-uc-bg: #1a4a2e;
      --badge-uc-fg: #6ecc8e;
      --badge-ent-bg: #2e2040;
      --badge-ent-fg: #c09fff;
      --radius: 10px;
      --sidebar-w: 256px;

      /* Body part accent colors */
      --c-shoulder: #4f8ef7;
      --c-chest:    #f74f8e;
      --c-back:     #f79a4f;
      --c-core:     #4fd9f7;
      --c-arms:     #bf4ff7;
      --c-legs:     #f7c84f;

      --zone-idle:   #1e2235;
      --zone-stroke: #3a4060;
      --body-fill:   #191c2d;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 0.85rem 1.5rem;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: baseline;
      gap: 1rem;
    }
    header h1 { font-size: 1.2rem; font-weight: 700; letter-spacing: -0.02em; }
    #video-count { font-size: 0.8rem; color: var(--text-muted); }

    /* ── Knowledge Cards strip ──────────────────────────────────────────────── */
    #knowledge-cards {
      padding: 1rem 1.25rem 0;
      border-bottom: 1px solid var(--border);
    }
    .kc-heading {
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 0.75rem;
    }
    #kc-list {
      display: flex;
      gap: 0.75rem;
      overflow-x: auto;
      padding-bottom: 0.75rem;
    }
    .kc-card {
      flex: 0 0 280px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.75rem;
    }
    .kc-question { font-size: 0.78rem; font-weight: 600; margin-bottom: 0.4rem; color: var(--text); }
    .kc-answer { font-size: 0.72rem; color: var(--text-muted); line-height: 1.5; }
    .kc-sources { margin-top: 0.4rem; display: flex; flex-wrap: wrap; gap: 0.25rem; }
    .kc-source { font-size: 0.65rem; color: var(--accent); text-decoration: none; }
    .kc-source:hover { text-decoration: underline; }

    main { display: flex; flex: 1; min-height: 0; }

    /* ── Sidebar ────────────────────────────────────────────────────────────── */
    aside#filters {
      width: var(--sidebar-w);
      flex-shrink: 0;
      padding: 1.25rem 1rem 1.5rem;
      background: var(--surface);
      border-right: 1px solid var(--border);
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
    }

    /* ── Search box ─────────────────────────────────────────────────────────── */
    .search-wrap { position: relative; }
    #search-input {
      width: 100%;
      padding: 0.4rem 0.6rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 0.8rem;
      outline: none;
    }
    #search-input:focus { border-color: var(--accent); }
    #search-input::placeholder { color: var(--text-muted); }
    .search-mode-label { font-size: 0.6rem; color: var(--text-muted); display: block; margin-top: 2px; }

    /* ── Body map ───────────────────────────────────────────────────────────── */
    .body-map { display: flex; flex-direction: column; align-items: center; gap: 0.6rem; }

    .body-views { display: flex; gap: 8px; justify-content: center; }

    .body-view { display: flex; flex-direction: column; align-items: center; gap: 3px; }

    .view-label {
      font-size: 0.6rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
    }

    .body-svg { width: 104px; height: auto; overflow: visible; }

    /* Non-interactive outline shapes — anatomical red fill */
    .outline {
      fill: #c8503a;
      opacity: 0.7;
      stroke: #8b2a1a;
      stroke-width: 0.5;
      pointer-events: none;
    }

    /* Zones: transparent at idle, show muscle boundary as dark-red stroke */
    .zone {
      fill: none;
      stroke: rgba(80, 18, 4, 0.5);
      stroke-width: 0.9;
      cursor: pointer;
      transition: fill 0.12s, filter 0.12s;
    }
    .zone:hover { fill: rgba(255, 255, 255, 0.10); }
    .zone.active { filter: brightness(1); }

    /* Muscle detail lines (abs, erectors) */
    .muscle-line {
      fill: none;
      stroke: rgba(80, 18, 4, 0.35);
      stroke-width: 0.7;
      pointer-events: none;
    }

    /* Active: solid opaque fill over the orange outline */
    [data-part="shoulder"].active { fill: var(--c-shoulder); stroke: var(--c-shoulder); }
    [data-part="chest"].active    { fill: var(--c-chest);    stroke: var(--c-chest); }
    [data-part="back"].active     { fill: var(--c-back);     stroke: var(--c-back); }
    [data-part="core"].active     { fill: var(--c-core);     stroke: var(--c-core); }
    [data-part="arms"].active     { fill: var(--c-arms);     stroke: var(--c-arms); }
    [data-part="legs"].active     { fill: var(--c-legs);     stroke: var(--c-legs); }

    /* Legend dots */
    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 0.3rem 0.6rem;
      justify-content: center;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      font-size: 0.65rem;
      color: var(--text-muted);
      cursor: pointer;
      user-select: none;
    }
    .legend-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .legend-item.active { color: var(--text); }

    /* ── Full-body button ────────────────────────────────────────────────────── */
    #full-body-btn {
      width: 100%;
      padding: 0.38rem;
      background: var(--zone-idle);
      border: 1.5px solid var(--zone-stroke);
      border-radius: 6px;
      color: var(--text-muted);
      font-size: 0.73rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.12s;
      letter-spacing: 0.02em;
    }
    #full-body-btn:hover { border-color: #4ff7a5; color: #4ff7a5; }
    #full-body-btn.active { background: #4ff7a5; border-color: #4ff7a5; color: #081a10; font-weight: 600; }

    /* ── Use-case section ───────────────────────────────────────────────────── */
    .section-label {
      font-size: 0.62rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      color: var(--text-muted);
      margin-bottom: 0.45rem;
    }

    .uc-pills { display: flex; flex-wrap: wrap; gap: 0.3rem; }

    .uc-pill {
      padding: 0.22rem 0.55rem;
      border-radius: 999px;
      border: 1.5px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      font-size: 0.7rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.12s;
    }
    .uc-pill:hover { border-color: var(--badge-uc-fg); color: var(--badge-uc-fg); }
    .uc-pill.active {
      background: var(--badge-uc-bg);
      border-color: var(--badge-uc-fg);
      color: var(--badge-uc-fg);
    }

    /* ── Clear button ───────────────────────────────────────────────────────── */
    #clear-btn {
      margin-top: auto;
      padding: 0.38rem;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-muted);
      font-size: 0.73rem;
      cursor: pointer;
      transition: border-color 0.12s, color 0.12s;
    }
    #clear-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Entity Hub Panel ───────────────────────────────────────────────────── */
    .entity-hub {
      border-top: 1px solid var(--border);
      padding: 0.75rem;
      background: var(--surface2);
      border-radius: var(--radius);
    }
    .entity-hub h4 { font-size: 0.75rem; font-weight: 600; margin-bottom: 0.4rem; }
    .entity-hub .hub-meta { font-size: 0.65rem; color: var(--text-muted); margin-bottom: 0.5rem; }
    .hub-related { display: flex; flex-wrap: wrap; gap: 0.3rem; margin-top: 0.4rem; }
    .hub-related-pill {
      font-size: 0.65rem;
      padding: 0.15rem 0.4rem;
      border-radius: 999px;
      background: var(--badge-ent-bg);
      color: var(--badge-ent-fg);
      border: none;
      cursor: pointer;
    }
    .hub-related-pill:hover { opacity: 0.8; }

    /* ── Card grid ──────────────────────────────────────────────────────────── */
    #grid { flex: 1; padding: 1.25rem; overflow-y: auto; }

    #cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      cursor: pointer;
      transition: border-color 0.15s, transform 0.1s;
    }
    .card:hover { border-color: var(--accent); transform: translateY(-2px); }

    .card-thumb {
      width: 100%;
      aspect-ratio: 16 / 9;
      object-fit: cover;
      display: block;
      background: var(--surface2);
    }

    .card-body { padding: 0.75rem; }

    .card-title {
      font-size: 0.9rem;
      font-weight: 600;
      line-height: 1.35;
      margin-bottom: 0.5rem;
      color: var(--text);
      text-decoration: none;
      display: block;
    }
    .card-title:hover { color: var(--accent); }

    .badge-row { display: flex; flex-wrap: wrap; gap: 0.3rem; margin-bottom: 0.35rem; }

    .badge { font-size: 0.68rem; font-weight: 500; padding: 0.15rem 0.45rem; border-radius: 999px; }
    .badge-bp  { background: var(--badge-bp-bg);  color: var(--badge-bp-fg); }
    .badge-uc  { background: var(--badge-uc-bg);  color: var(--badge-uc-fg); }
    .badge-ent { background: var(--badge-ent-bg); color: var(--badge-ent-fg); }

    /* Entity buttons in expanded panel */
    button.badge-ent {
      border: none;
      cursor: pointer;
      font-family: inherit;
    }
    button.badge-ent:hover { opacity: 0.8; }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 0.75rem 0.6rem;
    }
    .toggle-hint { font-size: 0.7rem; color: var(--text-muted); }
    .watch-link { font-size: 0.75rem; color: var(--accent); text-decoration: none; font-weight: 500; }
    .watch-link:hover { text-decoration: underline; }

    .entity-panel {
      display: none;
      padding: 0.6rem 0.75rem 0.75rem;
      border-top: 1px solid var(--border);
      background: var(--surface2);
    }
    .entity-panel h3 {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
    }
    .entity-list { display: flex; flex-wrap: wrap; gap: 0.3rem; }

    .card.expanded .entity-panel { display: block; }
    .card.expanded { border-color: var(--accent); }

    #empty { display: none; text-align: center; padding: 4rem 1rem; color: var(--text-muted); }
    #empty.visible { display: block; }

    .noscript-notice {
      background: #3a2a00; color: #f5c842;
      padding: 0.75rem 1rem; text-align: center; font-size: 0.85rem;
    }

    @media (max-width: 640px) {
      main { flex-direction: column; }
      aside#filters { width: 100%; height: auto; position: static; border-right: none; border-bottom: 1px solid var(--border); }
    }
  </style>
</head>
<body>

<noscript><p class="noscript-notice">Filtering requires JavaScript. All videos are shown below.</p></noscript>

<header>
  <h1>Gym Knowledge Browser</h1>
  <span id="video-count"></span>
</header>

<!-- Knowledge Cards strip (Epic 10) -->
<section id="knowledge-cards" hidden>
  <h2 class="kc-heading">Knowledge Cards</h2>
  <div id="kc-list"></div>
</section>

<main>
  <aside id="filters">

    <!-- Search box (Epic 8) -->
    <div class="search-wrap">
      <input id="search-input" type="search" placeholder="Search videos…" autocomplete="off">
      <span id="search-mode" class="search-mode-label" hidden>(offline)</span>
    </div>

    <div class="body-map">
      <div class="body-views">

        <!-- FRONT VIEW — anatomically accurate -->
        <div class="body-view">
          <span class="view-label">Front</span>
          <svg class="body-svg" viewBox="0 0 100 255">
            <!-- Anatomical outline shapes -->
            <!-- Head -->
            <ellipse class="outline" cx="50" cy="15" rx="11" ry="13"/>
            <!-- Neck -->
            <path class="outline" d="M44,27 L56,27 L57,36 L43,36 Z"/>
            <!-- Torso: shoulders wide, waist narrow, hip slightly wider -->
            <path class="outline" d="M20,36 Q14,48 16,70 L18,108 L24,130 L38,135 L38,140 L62,140 L62,135 L76,130 L82,108 L84,70 Q86,48 80,36 Q65,42 50,42 Q35,42 20,36 Z"/>
            <!-- Left arm -->
            <path class="outline" d="M16,70 Q8,85 9,110 Q10,118 14,122 L20,120 Q18,108 18,108 L16,70 Z"/>
            <!-- Right arm -->
            <path class="outline" d="M84,70 Q92,85 91,110 Q90,118 86,122 L80,120 Q82,108 82,108 L84,70 Z"/>
            <!-- Left leg -->
            <path class="outline" d="M38,140 L24,140 L20,185 Q19,215 22,250 L36,250 Q35,215 36,185 L40,155 Z"/>
            <!-- Right leg -->
            <path class="outline" d="M62,140 L76,140 L80,185 Q81,215 78,250 L64,250 Q65,215 64,185 L60,155 Z"/>

            <!-- Right shoulder cap (anterior delt) -->
            <path class="zone" data-part="shoulder" d="M80,38 C85,42 86,52 84,66 C82,72 78,74 75,72 C72,66 72,54 74,44 C76,38 79,36 80,38 Z"/>
            <!-- Left shoulder cap (anterior delt) -->
            <path class="zone" data-part="shoulder" d="M20,38 C15,42 14,52 16,66 C18,72 22,74 25,72 C28,66 28,54 26,44 C24,38 21,36 20,38 Z"/>
            <line class="muscle-line" x1="78" y1="42" x2="76" y2="68"/>
            <line class="muscle-line" x1="22" y1="42" x2="24" y2="68"/>

            <!-- Right pec -->
            <path class="zone" data-part="chest" d="M51,48 C58,46 66,50 70,58 C72,66 70,75 64,79 C58,82 51,80 51,78 Z"/>
            <!-- Left pec -->
            <path class="zone" data-part="chest" d="M49,48 C42,46 34,50 30,58 C28,66 30,75 36,79 C42,82 49,80 49,78 Z"/>

            <!-- Abs — 3 rows of 2 -->
            <ellipse class="zone" data-part="core" cx="46" cy="86" rx="4" ry="3"/>
            <ellipse class="zone" data-part="core" cx="54" cy="86" rx="4" ry="3"/>
            <ellipse class="zone" data-part="core" cx="45.5" cy="96" rx="3.5" ry="3"/>
            <ellipse class="zone" data-part="core" cx="54.5" cy="96" rx="3.5" ry="3"/>
            <ellipse class="zone" data-part="core" cx="45.5" cy="106" rx="3" ry="3"/>
            <ellipse class="zone" data-part="core" cx="54.5" cy="106" rx="3" ry="3"/>

            <!-- Right arm biceps — on arm outline (x≈80-92) -->
            <path class="zone" data-part="arms" d="M82,72 C81,80 80,94 80,108 C80,116 81,120 82,122 C85,118 87,108 88,96 C88,84 87,76 82,72 Z"/>
            <path class="zone" data-part="arms" d="M87,72 C90,78 92,92 92,106 C92,116 90,122 87,122 C86,116 86,106 86,92 C86,80 86,74 87,72 Z"/>
            <line class="muscle-line" x1="85" y1="76" x2="85" y2="120"/>

            <!-- Left arm biceps — on arm outline (x≈8-20) -->
            <path class="zone" data-part="arms" d="M18,72 C19,80 20,94 20,108 C20,116 19,120 18,122 C15,118 13,108 12,96 C12,84 13,76 18,72 Z"/>
            <path class="zone" data-part="arms" d="M13,72 C10,78 8,92 8,106 C8,116 10,122 13,122 C14,116 14,106 14,92 C14,80 14,74 13,72 Z"/>
            <line class="muscle-line" x1="15" y1="76" x2="15" y2="120"/>

            <!-- Right leg quads — on leg outline (x≈62-80) -->
            <path class="zone" data-part="legs" d="M70,142 C72,150 74,166 74,182 C74,196 72,206 70,210 C68,204 66,192 66,176 C66,160 67,150 70,142 Z"/>
            <path class="zone" data-part="legs" d="M76,144 C79,154 80,170 80,186 C80,200 78,208 76,210 C74,204 73,190 73,174 C73,158 74,150 76,144 Z"/>
            <line class="muscle-line" x1="72" y1="150" x2="73" y2="206"/>

            <!-- Left leg quads — on leg outline (x≈20-38) -->
            <path class="zone" data-part="legs" d="M30,142 C28,150 26,166 26,182 C26,196 28,206 30,210 C32,204 34,192 34,176 C34,160 33,150 30,142 Z"/>
            <path class="zone" data-part="legs" d="M24,144 C21,154 20,170 20,186 C20,200 22,208 24,210 C26,204 27,190 27,174 C27,158 26,150 24,144 Z"/>
            <line class="muscle-line" x1="28" y1="150" x2="27" y2="206"/>

            <!-- Right calves — 2 heads -->
            <path class="zone" data-part="legs" d="M70,212 C73,220 74,232 73,242 C72,248 70,250 68,250 C67,244 66,234 67,224 C67,216 68,210 70,212 Z"/>
            <path class="zone" data-part="legs" d="M76,214 C79,222 80,234 79,244 C78,250 76,250 74,250 C74,244 73,234 73,224 C74,216 75,212 76,214 Z"/>
            <line class="muscle-line" x1="72" y1="214" x2="73" y2="248"/>

            <!-- Left calves — 2 heads -->
            <path class="zone" data-part="legs" d="M30,212 C27,220 26,232 27,242 C28,248 30,250 32,250 C33,244 34,234 33,224 C33,216 32,210 30,212 Z"/>
            <path class="zone" data-part="legs" d="M24,214 C21,222 20,234 21,244 C22,250 24,250 26,250 C26,244 27,234 27,224 C26,216 25,212 24,214 Z"/>
            <line class="muscle-line" x1="28" y1="214" x2="27" y2="248"/>
          </svg>
        </div>

        <!-- BACK VIEW — anatomically accurate -->
        <div class="body-view">
          <span class="view-label">Back</span>
          <svg class="body-svg" viewBox="0 0 100 255">
            <!-- Same outline as front -->
            <ellipse class="outline" cx="50" cy="15" rx="11" ry="13"/>
            <path class="outline" d="M44,27 L56,27 L57,36 L43,36 Z"/>
            <path class="outline" d="M20,36 Q14,48 16,70 L18,108 L24,130 L38,135 L38,140 L62,140 L62,135 L76,130 L82,108 L84,70 Q86,48 80,36 Q65,42 50,42 Q35,42 20,36 Z"/>
            <path class="outline" d="M16,70 Q8,85 9,110 Q10,118 14,122 L20,120 Q18,108 18,108 L16,70 Z"/>
            <path class="outline" d="M84,70 Q92,85 91,110 Q90,118 86,122 L80,120 Q82,108 82,108 L84,70 Z"/>
            <path class="outline" d="M38,140 L24,140 L20,185 Q19,215 22,250 L36,250 Q35,215 36,185 L40,155 Z"/>
            <path class="outline" d="M62,140 L76,140 L80,185 Q81,215 78,250 L64,250 Q65,215 64,185 L60,155 Z"/>

            <!-- Posterior delts — same shoulder cap positions as front -->
            <path class="zone" data-part="shoulder" d="M80,38 C85,42 86,52 84,66 C82,72 78,74 75,72 C72,66 72,54 74,44 C76,38 79,36 80,38 Z"/>
            <path class="zone" data-part="shoulder" d="M20,38 C15,42 14,52 16,66 C18,72 22,74 25,72 C28,66 28,54 26,44 C24,38 21,36 20,38 Z"/>

            <!-- Traps diamond -->
            <path class="zone" data-part="back" d="M50,42 C55,42 60,44 62,48 C61,56 57,63 50,66 C43,63 39,56 38,48 C40,44 45,42 50,42 Z"/>
            <!-- Rhomboids / mid back -->
            <path class="zone" data-part="back" d="M50,66 C54,67 59,69 61,72 C61,82 57,92 50,98 C43,92 39,82 39,72 C41,69 46,67 50,66 Z"/>
            <!-- Lat wings -->
            <path class="zone" data-part="back" d="M61,70 C65,76 66,86 64,96 C62,104 58,110 54,112 C53,102 53,90 54,80 C56,74 59,71 61,70 Z"/>
            <path class="zone" data-part="back" d="M39,70 C35,76 34,86 36,96 C38,104 42,110 46,112 C47,102 47,90 46,80 C44,74 41,71 39,70 Z"/>
            <line class="muscle-line" x1="50" y1="46" x2="50" y2="110"/>

            <!-- Triceps — on arm outlines, same positions as front biceps -->
            <path class="zone" data-part="arms" d="M82,72 C81,80 80,94 80,108 C80,116 81,120 82,122 C85,118 87,108 88,96 C88,84 87,76 82,72 Z"/>
            <path class="zone" data-part="arms" d="M87,72 C90,78 92,92 92,106 C92,116 90,122 87,122 C86,116 86,106 86,92 C86,80 86,74 87,72 Z"/>
            <line class="muscle-line" x1="85" y1="76" x2="85" y2="120"/>
            <path class="zone" data-part="arms" d="M18,72 C19,80 20,94 20,108 C20,116 19,120 18,122 C15,118 13,108 12,96 C12,84 13,76 18,72 Z"/>
            <path class="zone" data-part="arms" d="M13,72 C10,78 8,92 8,106 C8,116 10,122 13,122 C14,116 14,106 14,92 C14,80 14,74 13,72 Z"/>
            <line class="muscle-line" x1="15" y1="76" x2="15" y2="120"/>

            <!-- Glutes -->
            <path class="zone" data-part="legs" d="M50,140 C44,140 38,144 36,150 C34,158 37,166 43,170 C47,172 50,172 50,170 Z"/>
            <path class="zone" data-part="legs" d="M50,140 C56,140 62,144 64,150 C66,158 63,166 57,170 C53,172 50,172 50,170 Z"/>
            <line class="muscle-line" x1="50" y1="141" x2="50" y2="169"/>

            <!-- Right hamstrings — on leg outline (x≈62-80) -->
            <path class="zone" data-part="legs" d="M70,174 C72,182 74,196 74,210 C74,218 72,224 70,226 C68,220 66,208 66,194 C66,180 67,174 70,174 Z"/>
            <path class="zone" data-part="legs" d="M76,176 C79,186 80,200 80,214 C80,222 78,226 76,226 C74,220 73,206 73,192 C73,178 74,174 76,176 Z"/>
            <line class="muscle-line" x1="72" y1="178" x2="73" y2="222"/>

            <!-- Left hamstrings — on leg outline (x≈20-38) -->
            <path class="zone" data-part="legs" d="M30,174 C28,182 26,196 26,210 C26,218 28,224 30,226 C32,220 34,208 34,194 C34,180 33,174 30,174 Z"/>
            <path class="zone" data-part="legs" d="M24,176 C21,186 20,200 20,214 C20,222 22,226 24,226 C26,220 27,206 27,192 C27,178 26,174 24,176 Z"/>
            <line class="muscle-line" x1="28" y1="178" x2="27" y2="222"/>

            <!-- Right calves back -->
            <path class="zone" data-part="legs" d="M70,228 C73,236 74,242 72,248 C71,250 69,250 67,248 C66,242 66,234 67,228 C68,224 70,226 70,228 Z"/>
            <path class="zone" data-part="legs" d="M76,230 C79,238 80,244 78,248 C77,250 75,250 73,248 C73,242 73,234 74,228 C74,224 75,226 76,230 Z"/>
            <line class="muscle-line" x1="72" y1="230" x2="73" y2="248"/>

            <!-- Left calves back -->
            <path class="zone" data-part="legs" d="M30,228 C27,236 26,242 28,248 C29,250 31,250 33,248 C34,242 34,234 33,228 C32,224 30,226 30,228 Z"/>
            <path class="zone" data-part="legs" d="M24,230 C21,238 20,244 22,248 C23,250 25,250 27,248 C27,242 27,234 26,228 C26,224 25,226 24,230 Z"/>
            <line class="muscle-line" x1="28" y1="230" x2="27" y2="248"/>
          </svg>
        </div>

      </div>

      <!-- Full-body toggle -->
      <button id="full-body-btn">Full Body</button>

      <!-- Color legend -->
      <div class="legend" id="legend">
        <span class="legend-item" data-part="shoulder"><span class="legend-dot" style="background:var(--c-shoulder)"></span>Shoulder</span>
        <span class="legend-item" data-part="chest">   <span class="legend-dot" style="background:var(--c-chest)"></span>Chest</span>
        <span class="legend-item" data-part="back">    <span class="legend-dot" style="background:var(--c-back)"></span>Back</span>
        <span class="legend-item" data-part="core">    <span class="legend-dot" style="background:var(--c-core)"></span>Core</span>
        <span class="legend-item" data-part="arms">    <span class="legend-dot" style="background:var(--c-arms)"></span>Arms</span>
        <span class="legend-item" data-part="legs">    <span class="legend-dot" style="background:var(--c-legs)"></span>Legs</span>
      </div>
    </div>

    <!-- Use-case filters -->
    <div>
      <p class="section-label">Training Goal</p>
      <div class="uc-pills">
        <button class="uc-pill" data-uc="rehab">Rehab</button>
        <button class="uc-pill" data-uc="mobility">Mobility</button>
        <button class="uc-pill" data-uc="strength">Strength</button>
        <button class="uc-pill" data-uc="hypertrophy">Hypertrophy</button>
        <button class="uc-pill" data-uc="general-fitness">General</button>
        <button class="uc-pill" data-uc="programming">Programming</button>
      </div>
    </div>

    <button id="clear-btn">Clear all filters</button>

    <!-- Entity Hub Panel (Epic 9) -->
    <div id="entity-hub" class="entity-hub" hidden>
      <div id="entity-hub-content"></div>
    </div>

  </aside>

  <section id="grid">
    <div id="cards"></div>
    <div id="empty">No videos match the selected filters.</div>
  </section>
</main>

<script>
(function () {
  'use strict';

  let allVideos    = [];
  let entitiesData = {};
  let searchResults = null;
  let searchMode    = 'offline';
  let searchQuery   = '';
  let activeEntityId = null;
  let searchTimer    = null;

  const activeParts = new Set();
  const activeUcs   = new Set();

  // ── Utility ────────────────────────────────────────────────────────────────
  function esc(str) {
    return String(str)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  function slugify(name) {
    return name.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
  }

  // ── Body zone clicks ───────────────────────────────────────────────────────
  document.querySelectorAll('.zone').forEach(function (el) {
    el.addEventListener('click', function () {
      const part = this.dataset.part;
      if (activeParts.has(part)) {
        activeParts.delete(part);
      } else {
        activeParts.add(part);
      }
      syncUI();
      renderFiltered();
    });
  });

  // Legend items also act as toggles
  document.querySelectorAll('.legend-item').forEach(function (el) {
    el.addEventListener('click', function () {
      const part = this.dataset.part;
      if (activeParts.has(part)) {
        activeParts.delete(part);
      } else {
        activeParts.add(part);
      }
      syncUI();
      renderFiltered();
    });
  });

  // Full-body: clear all part selections (= show everything)
  document.getElementById('full-body-btn').addEventListener('click', function () {
    activeParts.clear();
    syncUI();
    renderFiltered();
  });

  function syncUI() {
    // Sync zones across both SVGs
    document.querySelectorAll('.zone').forEach(function (el) {
      el.classList.toggle('active', activeParts.has(el.dataset.part));
    });
    // Sync legend
    document.querySelectorAll('.legend-item').forEach(function (el) {
      el.classList.toggle('active', activeParts.has(el.dataset.part));
    });
    // Full-body active when nothing selected
    document.getElementById('full-body-btn').classList.toggle('active', activeParts.size === 0);
  }

  // ── Use-case pills ─────────────────────────────────────────────────────────
  document.querySelectorAll('.uc-pill').forEach(function (el) {
    el.addEventListener('click', function () {
      const uc = this.dataset.uc;
      if (activeUcs.has(uc)) {
        activeUcs.delete(uc);
        this.classList.remove('active');
      } else {
        activeUcs.add(uc);
        this.classList.add('active');
      }
      renderFiltered();
    });
  });

  // ── Clear ──────────────────────────────────────────────────────────────────
  document.getElementById('clear-btn').addEventListener('click', function () {
    activeParts.clear();
    activeUcs.clear();
    searchQuery = '';
    searchResults = null;
    document.getElementById('search-input').value = '';
    document.getElementById('search-mode').hidden = true;
    document.querySelectorAll('.uc-pill').forEach(function (el) { el.classList.remove('active'); });
    syncUI();
    renderFiltered();
  });

  // ── Search (Epic 8) ────────────────────────────────────────────────────────
  document.getElementById('search-input').addEventListener('input', function () {
    const q = this.value.trim();
    searchQuery = q;
    clearTimeout(searchTimer);
    if (!q) {
      searchResults = null;
      document.getElementById('search-mode').hidden = true;
      renderFiltered();
      return;
    }
    searchTimer = setTimeout(function () { doSearch(q); }, 400);
  });

  function doSearch(q) {
    fetch('http://localhost:8000/search?q=' + encodeURIComponent(q) + '&limit=10')
      .then(function (r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
      .then(function (data) {
        searchResults = Array.isArray(data) ? data : (data.results || []);
        searchMode = 'server';
        document.getElementById('search-mode').hidden = true;
        renderFiltered();
      })
      .catch(function () {
        // Fallback: client-side offline search
        searchResults = null;
        searchMode = 'offline';
        document.getElementById('search-mode').hidden = false;
        renderFiltered();
      });
  }

  function searchOk(v) {
    if (!searchQuery) return true;
    if (searchResults !== null && searchMode === 'server') {
      return searchResults.some(function (r) { return r.video_id === v.video_id; });
    }
    // Offline: title or entity name substring match
    const q = searchQuery.toLowerCase();
    if ((v.title || '').toLowerCase().includes(q)) return true;
    return (v.entities || []).some(function (e) {
      return (e.name || '').toLowerCase().includes(q);
    });
  }

  // ── Filter logic ───────────────────────────────────────────────────────────
  function videoMatches(v) {
    const bpOk = activeParts.size === 0
      || Array.from(activeParts).some(function (p) { return (v.body_parts || []).includes(p); });
    const ucOk = activeUcs.size === 0
      || Array.from(activeUcs).some(function (u) { return (v.use_cases  || []).includes(u); });
    return bpOk && ucOk && searchOk(v);
  }

  // ── Card builder ───────────────────────────────────────────────────────────
  function buildCard(v) {
    const card = document.createElement('article');
    card.className = 'card';

    const thumbSrc = v.video_id.startsWith('placeholder')
      ? '' : `https://img.youtube.com/vi/${v.video_id}/mqdefault.jpg`;

    const bpBadges  = (v.body_parts || []).map(function (b) { return `<span class="badge badge-bp">${esc(b)}</span>`; }).join('');
    const ucBadges  = (v.use_cases  || []).map(function (u) { return `<span class="badge badge-uc">${esc(u)}</span>`; }).join('');
    const entBadges = (v.entities   || []).map(function (e) {
      const id = slugify(e.name);
      return `<button class="badge badge-ent ent-btn" data-entity-id="${esc(id)}">${esc(e.name)} · ${esc(e.type)}</button>`;
    }).join('');

    card.innerHTML = `
      ${thumbSrc
        ? `<img class="card-thumb" src="${esc(thumbSrc)}" alt="${esc(v.title)}" loading="lazy">`
        : `<div class="card-thumb" style="display:flex;align-items:center;justify-content:center;font-size:0.75rem;color:var(--text-muted)">No thumbnail</div>`}
      <div class="card-body">
        <a class="card-title" href="${esc(v.url)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">${esc(v.title)}</a>
        <div class="badge-row">${bpBadges}</div>
        <div class="badge-row">${ucBadges}</div>
      </div>
      <div class="card-footer">
        <span class="toggle-hint">Click to see entities</span>
        <a class="watch-link" href="${esc(v.url)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">Watch ↗</a>
      </div>
      <div class="entity-panel">
        <h3>Entities</h3>
        <div class="entity-list">${entBadges || '<span style="color:var(--text-muted);font-size:0.75rem">None tagged</span>'}</div>
      </div>`;

    card.addEventListener('click', function () {
      this.classList.toggle('expanded');
      this.querySelector('.toggle-hint').textContent =
        this.classList.contains('expanded') ? 'Click to collapse' : 'Click to see entities';
    });

    return card;
  }

  // ── Render ─────────────────────────────────────────────────────────────────
  function renderFiltered() {
    const container = document.getElementById('cards');
    const empty     = document.getElementById('empty');
    const frag      = document.createDocumentFragment();
    let shown       = 0;

    allVideos.forEach(function (v) {
      if (videoMatches(v)) { frag.appendChild(buildCard(v)); shown++; }
    });

    container.innerHTML = '';
    container.appendChild(frag);
    empty.classList.toggle('visible', shown === 0);
    document.getElementById('video-count').textContent =
      shown === allVideos.length ? `${allVideos.length} videos` : `${shown} / ${allVideos.length} videos`;
  }

  // ── Entity Hub (Epic 9) ────────────────────────────────────────────────────
  // Event delegation on #cards for .ent-btn clicks
  document.getElementById('cards').addEventListener('click', function (e) {
    const btn = e.target.closest('.ent-btn');
    if (!btn) return;
    e.stopPropagation();

    const entityId = btn.dataset.entityId;
    if (activeEntityId === entityId) {
      // Toggle off
      activeEntityId = null;
      hideEntityHub();
      return;
    }
    activeEntityId = entityId;
    showEntityHub(entityId);
  });

  function showEntityHub(entityId) {
    const hub = document.getElementById('entity-hub');
    const content = document.getElementById('entity-hub-content');

    // Find entity in entitiesData
    const entity = entitiesData[entityId];
    if (!entity) {
      content.innerHTML = `<h4>${esc(entityId)}</h4><p class="hub-meta">No details available.</p>`;
      hub.hidden = false;
      scrollSidebarToBottom();
      return;
    }

    // Count appearances
    const videoCount = allVideos.filter(function (v) {
      return (v.entities || []).some(function (e) { return slugify(e.name) === entityId; });
    }).length;

    // Related entities
    const relatedPills = (entity.related || []).map(function (r) {
      const rId = slugify(r);
      return `<button class="hub-related-pill" data-entity-id="${esc(rId)}">${esc(r)}</button>`;
    }).join('');

    // Use-case counts
    const ucText = entity.use_case_counts
      ? Object.entries(entity.use_case_counts).map(function (kv) { return kv[0] + ': ' + kv[1]; }).join(', ')
      : '';

    content.innerHTML = `
      <h4>${esc(entity.name || entityId)}</h4>
      <p class="hub-meta">${esc(entity.type || '')}${entity.type ? ' · ' : ''}Appears in ${videoCount} video${videoCount !== 1 ? 's' : ''}${ucText ? ' · ' + esc(ucText) : ''}</p>
      ${relatedPills ? `<div class="hub-related">${relatedPills}</div>` : ''}
    `;

    hub.hidden = false;
    scrollSidebarToBottom();

    // Clicking related pills
    content.querySelectorAll('.hub-related-pill').forEach(function (pill) {
      pill.addEventListener('click', function () {
        const rId = this.dataset.entityId;
        if (activeEntityId === rId) {
          activeEntityId = null;
          hideEntityHub();
        } else {
          activeEntityId = rId;
          showEntityHub(rId);
        }
      });
    });
  }

  function hideEntityHub() {
    document.getElementById('entity-hub').hidden = true;
  }

  function scrollSidebarToBottom() {
    const sidebar = document.getElementById('filters');
    sidebar.scrollTop = sidebar.scrollHeight;
  }

  // Escape key hides entity hub
  document.addEventListener('keydown', function (e) {
    if (e.key === 'Escape') {
      activeEntityId = null;
      hideEntityHub();
    }
  });

  // ── Knowledge Cards (Epic 10) ──────────────────────────────────────────────
  function renderKnowledgeCards(cards) {
    if (!cards || cards.length === 0) return;
    const list = document.getElementById('kc-list');
    cards.forEach(function (card) {
      const sources = (card.sources || []).map(function (s) {
        return `<a class="kc-source" href="${esc(s.url || '#')}" target="_blank" rel="noopener">${esc(s.title || s.video_id || 'source')}</a>`;
      }).join('');
      const div = document.createElement('div');
      div.className = 'kc-card';
      div.innerHTML = `
        <p class="kc-question">${esc(card.question || card.query || '')}</p>
        <p class="kc-answer">${esc(card.answer || card.summary || '')}</p>
        ${sources ? `<div class="kc-sources">${sources}</div>` : ''}
      `;
      list.appendChild(div);
    });
    document.getElementById('knowledge-cards').hidden = false;
  }

  // ── Boot ───────────────────────────────────────────────────────────────────
  // Load videos
  const videosPromise = fetch('data/videos.json')
    .then(function (r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
    .then(function (videos) {
      allVideos = videos;
      syncUI();
      renderFiltered();
    })
    .catch(function (err) {
      document.getElementById('cards').innerHTML =
        `<p style="color:var(--text-muted);padding:2rem">Failed to load videos: ${esc(String(err))}</p>`;
    });

  // Load entities (Epic 9) — fail gracefully
  fetch('data/entities.json')
    .then(function (r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
    .then(function (data) {
      // Accept array (keyed by id field) or object map
      if (Array.isArray(data)) {
        data.forEach(function (e) {
          const id = slugify(e.name || e.id || '');
          if (id) entitiesData[id] = e;
        });
      } else {
        entitiesData = data;
      }
    })
    .catch(function () { entitiesData = {}; });

  // Load synthesis (Epic 10) — fail gracefully
  fetch('data/synthesis.json')
    .then(function (r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
    .then(function (data) { renderKnowledgeCards(Array.isArray(data) ? data : []); })
    .catch(function () { /* section stays hidden */ });

})();
</script>
</body>
</html>
